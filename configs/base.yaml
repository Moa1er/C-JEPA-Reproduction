seed: 42
device: "cpu"
num_workers: 0
pin_memory: false

data:
  index_file: "data/val.jsonl"
  video_root: "/home/arda/projects/DSAIT4030/data/clevrer_val"
  video_glob: "**/*.mp4"
  split_name: "val"
  clip_len: 6
  resize: 64
  interpolation: "bilinear"
  mean: [0.5, 0.5, 0.5]
  std: [0.5, 0.5, 0.5]

encoder:
  checkpoint_path: "checkpoints/stosavi_clevrer_params/model_12.pth"
  input_key: "img"
  output_slots_key: "post_slots"
  slot_masks_key: "post_masks"
  expected_num_slots: 7
  expected_slot_dim: 128

run:
  batch_size: 2
  max_videos: 8
  output_dir: "outputs/features/val"
